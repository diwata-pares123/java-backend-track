name: Microservices Build Pipeline

on:
  push:
    branches: [ "master", "main" ]

jobs:
  # --- JOB 1: The Build & Test Stage ---
  build-all:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin' 
          cache: maven 

      # --- IDENTITY SERVICE ---
      - name: Build and Test Identity Service
        working-directory: ./identity-service
        run: mvn clean package

      - name: Build and Version Identity Docker Image
        working-directory: ./identity-service
        run: |
          echo "Building Identity Docker image with tag: ${{ github.sha }}"
          docker build -t identity-service:${{ github.sha }} .
          docker images

      # --- DELIVERY SERVICE ---
      - name: Build and Test Delivery Service
        working-directory: ./delivery-service
        run: mvn clean package

      - name: Build and Version Delivery Docker Image
        working-directory: ./delivery-service
        run: |
          echo "Building Delivery Docker image with tag: ${{ github.sha }}"
          docker build -t delivery-service:${{ github.sha }} .
          docker images

      # --- OPERATIONS SERVICE ---
      - name: Build and Test Operations Service
        working-directory: ./operations-service
        run: mvn clean package

      - name: Build and Version Operations Docker Image
        working-directory: ./operations-service
        run: |
          echo "Building Operations Docker image with tag: ${{ github.sha }}"
          docker build -t operations-service:${{ github.sha }} .
          docker images

  # --- JOB 2: The Quality Gate Stage ---
  quality-gate:
    needs: build-all 
    runs-on: ubuntu-latest
    steps:
      - name: Simulated SonarQube Scan for All Services
        run: |
          echo "Scanning Identity Service for vulnerabilities..."
          echo "Scanning Delivery Service for vulnerabilities..."
          echo "Scanning Operations Service for vulnerabilities..."
          echo "Scanning all code for hardcoded secrets..."
          echo "✅ Quality Gate Passed! All services are clean and secure."
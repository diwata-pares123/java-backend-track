name: Microservices Build Pipeline

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-all:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin' 
          cache: maven 

      # Step C: Build and Test Identity Service
      - name: Build and Test Identity Service
        working-directory: ./identity-service
        run: mvn clean package

      # Step D: Build and Test Delivery Service
      - name: Build and Test Delivery Service
        working-directory: ./delivery-service
        run: mvn clean package

      # Step E: Build and Test Operations Service
      - name: Build and Test Operations Service
        working-directory: ./operations-service
        run: mvn clean package
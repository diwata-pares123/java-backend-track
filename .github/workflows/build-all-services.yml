name: Microservices Build Pipeline

on:
  push:
    branches: [ "master", "main" ]

jobs:
  # --- JOB 1: The Build & Test Stage ---
  build-all:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin' 
          cache: maven 

      - name: Build and Test Identity Service
        working-directory: ./identity-service
        run: mvn clean package

      - name: Build and Test Delivery Service
        working-directory: ./delivery-service
        run: mvn clean package

      - name: Build and Test Operations Service
        working-directory: ./operations-service
        run: mvn clean package

  # --- JOB 2: The Quality Gate Stage ---
  quality-gate:
    # CRITICAL: This tells the pipeline to WAIT for JOB 1 to finish successfully!
    needs: build-all 
    runs-on: ubuntu-latest
    steps:
      - name: Simulated SonarQube Scan for All Services
        run: |
          echo "Scanning Identity Service for vulnerabilities..."
          echo "Scanning Delivery Service for vulnerabilities..."
          echo "Scanning Operations Service for vulnerabilities..."
          echo "Scanning all code for hardcoded secrets..."
          echo "✅ Quality Gate Passed! All services are clean and secure."